body:
  text: 太上昇玄三一融神變化妙經卷上下同卷辰五爾時元始天尊處於虚无自然玄一七寳之座凝神遐想恬遊玄漠普爲一切賢聖諸天人衆講楊大法漸頓進退因縁湛寂无爲洞觀一切无量法門虚實空有眞僞邪正善惡清濁髙下貴賤内外文武大小一切萬法无量无數不可具陳各隨其習業所執事相不同乍合乍離乍存乍亡乍來乍去或岀或沒乍進乍退乍生乍滅或有或无乍眞乍僞或貴或賤乍苦乍樂或貧或富爲男爲女或文或武時好時醜乍凶乍吉或在凡在聖如此受報无量事相種種因縁不可具說皆因前縁所行一切大小之法修習來報致得今日受業不同不悟大乗无爲法教故難解脫住著小秉少知少見心有縛著不解明了頓悟玄理通逹无爲虚融法性凝神湛照觀行无爲而求解脱但只逢法住法不識正性本體清靜强生貪著繫縛執著因縁不悟本乗至眞无上大道具足圓滿成就一切神力功德智慧解脫因縁偏見執著强生分别更生誹謗不識理性本來一乗无二暫隨凡化動靜改變因果苦樂不同良由宿世習業今日受報如此爾時衆中有玄一道君從衆而出旋行寳座擎拳恭教稽首上白无上大道虚无至尊神智髙廣玄通无礙大聖緫統一切天上天下虚融道性分无量法門安定空有洞觀一切受報因縁了别事相玄照業因慈悲化度廣開法門唯願善濟今日衆等萬劫有幸宿恩德報今日得見无上大道尊顔敷演法教普願成就一切衆生導引群迷速登道岸俱會大乗法相巍巍功圓德就統了无爲玄解法要大乗根原智德圓滿助道揚化普度天人救㧞一切无量衆生普願成就齊入法門禮侍尊顔親承大法供養修禮所願從心功德如願智行俱備唯願廣化一切普登大法唯願成就與道合同爾時元始天尊告玄一道君曰善哉善哉汝令發問至要无上大法因縁甚爲深妙難可思議汝等復座諦聴吾爲汝說无上大法成就一切无量法門有成有敗有生有滅有岀有没有進有退有是有非有好有惡有長有短有愚有智有明有暗良由過去習業不同修行小法爲道枝葉所修一切功德暫得人天福報因縁報盡還歸磨滅不免輪廻六道受諸報對善惡之事不停生生復死死死復生經歴生死造善造惡報對无窮无盡難得解脫无有大法勝縁㧞度頓得捨離一切業道去離三惡五道九幽八難三塗五苦超出三界之上度脫生死之道解脫无爲所修一切有爲法教福報有盡還歸破壤磨滅泥土同法不得正眞解脫良由心智不逹報繫有爲希求功報若盡還歸散壤如此辛苦不免无常變化隨其來業流浪不得自在被他拘繫无有休息若夫大士上智了逹玄悟道性之人所修一切功德不希功報心无取著我所修一切有爲功德者唯將顯明事相堅持法教引導愚人令其出離解脫漸得利益進入法門賴此功德福善莊嚴以道結縁所修一切因果以保命根求生受報功德因縁唯我作導師於其中間引化種種事相因縁並將捨施一切天地神祗㧞度六道過去九玄七祖一切先亡罪惡衆生令出苦海進入道門俱得解脫唯我獨守无爲歸根反本靜我神識清淨氣性護我身心内无所起外无所染心无所住遍行圓滿不依一法而生法相不住一法而生繫縛不起一念欲求福報功德因縁我所行學狀若无修我所云爲作諸功德喻若无福不敢希報回施一切人天世界唯願以此功德散備一切六道福善荘巖與我同得解脫齊入至眞俱登道岸太上告玄一大道君曰汝等徒衆所有助道行化開悟群迷爲諸男女作大法船如大法海包納含藏萬川如以天地廕覆萬物皆遣利益教化人天隨縁應化看其根性利鈍愚智清濁闇明漸頓悟解量測身心隨縁教授皆令得旨趣小悟小化大悟大化濁者濁化善者善化惡者惡化方便善誘令出彼岸值道見法解脫因縁成就大乗法體巍巍无上道矣太上昇玄三一融神變化妙經卷上
