body:
  text: 一之道上一玄尊有二大臣合成三人左臣號玄一道君右臣號太和老君太和者頭白衣服白玄一者頭衣俱青爲道之魂魄也中一元尊有二大卿左號眞人右號光堅下元眞一帝尊左有幽精右有帝卿等上中下三一尊有二大臣事其左右成一身有三人三一遂成有九人名爲九一之道在虚无无形上號爲九玄中號爲九空下號爲九炁之道故名之爲虚无三一化之在九玄攝道境九空攝聖境九炁攝眞境此爲道中九一之道九玄號无名常存天尊九空號空洞虚皇天尊九炁號爲元始天尊上一化爲三清中一化爲三界下一化爲三輪上三清爲聖境中三界爲眞境下三輪爲仙境輪者是凡或上或下或中來去輪轉不定故號爲三輪下輪入地府中輪生天上輪入眞境故號之爲三輪是故道有九一天有九一地有九一人有九一四九合成三十六炁緫會三十六天一一變生九一九九八十一元炁空有八十一道炁天有八十一聖炁地有八十一眞炁人有八十一仙炁緫會三百六十炁上道有三百六十虚无自然空玄之道天有三百六十聖化之道地有三百六十洞眞之道人有三百六十骨節騰化飛仙之道稟其炁性大呼小呼上呼三萬六千神識中呼三千六百神識下呼三百六十神識會一年三百六十日緫備在人身中所應也若能修眞學道則得三萬六千神識來備自然身輕白日飛騰與道合同道言此三百六十炁之所分化上有三十六空中有三十六天下有三百六十名山玄化在人有三十六國所應也道有三萬六千神變玄象天有三萬六千宫殿地有三萬六千洞府人有三萬六千神識道爲玄空之至精人是天地之靈精天地應玄空之大象道玄空而通變天稟淨性而得清地稟結炁而有形人稟精識而得生道无元炁而无變化天无元炁而不玄清地无元炁而不能生成萬物人无元炁命根則不存所以人能修道養生先須解存元炁而養神神炁若得住人命則得長生神者識也識者正也正者眞也眞者聖也聖者性也性者道也道者空也空者玄也玄者虚无也虚无者自然也自然者眞常也眞常者无名也无名者混沌也所以號之爲混沌无形无影无極无窮也炁者虚也炁者无也炁者通也炁者風也炁者動也炁者象也炁者變也炁者呼吸也炁者輕舉也炁者飛颺也炁者散也炁者命也炁者開也炁者明也炁者光象也炁者能匿影藏形也炁者能運轉也歎其神炁變化功能不可尋測矣太上昇玄三一融神變化妙經卷下
