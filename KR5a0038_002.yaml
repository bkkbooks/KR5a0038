front:
  text: 太上昇玄三一融神變化妙經卷下道言萬物之中人爲最貴萬法之中唯一是貴萬一之中唯眞是貴萬眞之中唯聖是貴萬聖之中唯道是貴所言玄一眞一太一三一玄者是空空虚玄逺統上无極統下无基中觀无邊故名玄一玄者逺也體性无實含藏一切不礙萬物故名之爲虚无虚者能通无者皆空性體无質故名之爲空玄者是一一者是道性者是淨眞一者是實理者是正故名正一太者是大能生萬物包統一切故名太一三一者是子上承玄父之靈炁下乗玄母之元精養育成形故上取玄父炁二下取玄母炁一合成和合中道共成一象故言兩半而成一一者子也故名嬰兒赤子子者狀若始生之狀禀炁第三故名三一赤子也第一是玄父禀玄空雄陽之炁所成故名玄一第二玄母禀雌隂之炁所成故名雌一能生萬物養育含情故名玄母號之爲太一一者大也故名之爲道毋是故稱玄一者天尊位稱玄毋雌一者天皇位稱眞一帝一者道君位稱三一者赤子眞人位稱正一者大法師位稱无名常存三一者是混空虚无道炁未分形相未立渾淪无有形影故名混沌无名常存三一道炁分形變化百億神通故稱空洞變化三一後分斷隂陽生成萬物布化十方故稱隂陽三一第一无名三一第二虚无自然三一第三空洞變化三一第四玄一第五眞一第六元皇三一第七太一第八正一第九赤子隂陽故稱爲九一之道空有九一常乗九炁道有九一位有九尊天有九一上有九清地有九一下有九泉人有九一頭上有九宫所言三一者稱之爲三寳上虚无三寳玄元始三炁天中有三寳天有三界地有三寳嶽瀆水火人有三寳上中下丹田泥丸絳宫所稱爲三五者三是玄元始三炁五是五行炁性在空爲五炁在天爲五星在位爲五帝在地爲五方在人爲五藏是也道言三一行宫運化不停所居不同或以鎭在玄天七寳之宫或布化崑崙遊歴玄都或統御大羅觀望玄臺或治化天庭洞房明堂遍行六合帀至五皇幽房玄關華蓋之宫九一九子九女九皇出入崑崙治化九天明照九天日月出從天關入從幽門或處天廬日月之間或下治黄庭泥丸絳宫或隱在北極大泉之中呼吸精炁乗駕六龍遊往龜山或乗靈波以御九龍翔行九鳳策使太一始老帝公行至三月三一之間混合萬變冶錬百關開導津液神靜體安中央黄老治化玉皇戊巳洞神原一帝眞治化幽谷補養華原乗炁納眞出入生路或處命門關閉道户精不泄散邪惡不干太素流霞乗風散煙浮空駕虚上造雲庭開闔來去出入廬間千神百靈朝謁帝庭城闕交錯帷帳成雲天眞緫炁上通聖關玄一至道來去不難吞珠藏玉白石巖巒樓閣萬重黃帝之宅甘淵无窮玄芝化生金漿玉汋不死神丹還年保命骨化内騰遊歴八方上謁三清下治三界變化萬方都會玄臺朝謁聖皇旋行金闕下治帝郷五嶽四瀆國土寧康一切萬姓永保吉良上一九帝天君諱凝天字玄先其二帝卿肇勤精從天仙兵馬一萬二千人中元三一帝皇諱神珠字子丹帝卿眞人光堅從神仙兵馬一萬二千人下元眞一諱神精字谷玄帝卿歸上明從地仙兵馬一萬二千人其上一長九寸九分著紫繡金帔戴玄天寳冠坐七寳之座或時乗九龍之車遊歴三界手執天寳之鑪治化玉清其中一長三寸三分著丹錦之帔戴九鳳之冠坐七寳之座或時乗九麟之車遊歴十方手執金鑪治化上清其下一長五寸五分著黄錦之帔戴九龍逺遊之冠坐七寳之座或時乗五色師子之車巡行五嶽手執寳香之鑪治化太清其三一緫會平旦朝上帝一君交度神炁補養骨髓納我華津神炁塡滿體發華鮮日中緫會中一絳宫教練赤子還魂復魄反老嬰童度命回年保命无窮日暮緫會下元眞一之宫清蕩穢濁除故納新生我五老帝眞變易骨髓膓化爲筋金骨玉髓契道契眞自然變化无窮永與三寳同保命根夫三一者一一有變爲三三一一變生成九
