body:
  text: 一之道上一玄尊有二大臣合成三人左臣號玄一道君右臣號太和老君太和者頭白衣服白玄一者頭衣俱青為道之魂魄也中一元尊有二大卿左號真人右號光堅下元真一帝尊左有幽精右有帝卿等上中下三一尊有二大臣事其左右成一身有三人三一遂成有九人名為九一之道在虛無無形上號為九玄中號為九空下號為九氣之道故名之為虛無三一化之在九玄攝道境九空攝聖境九氣攝真境此為道中九一之道九玄號無名常存天尊九空號空洞虛皇天尊九氣號為元始天尊上一化為三清中一化為三界下一化為三輪上三清為聖境中三界為真境下三輪為仙境輪者是凡或上或下或中來去輪轉不定故號為三輪下輪入地府中輪生天上輪入真境故號之為三輪是故道有九一天有九一地有九一人有九一四九合成三十六氣總會三十六天一一變生九一九九八十一元氣空有八十一道氣天有八十一聖氣地有八十一真氣人有八十一仙氣總會三百六十氣上道有三百六十虛無自然空玄之道天有三百六十聖化之道地有三百六十洞真之道人有三百六十骨節騰化飛仙之道稟其氣性大呼小呼上呼三萬六千神識中呼三千六百神識下呼三百六十神識會一年三百六十日總備在人身中所應也若能修真學道則得三萬六千神識來備自然身輕白日飛騰與道合同道言此三百六十氣之所分化上有三十六空中有三十六天下有三百六十名山玄化在人有三十六國所應也道有三萬六千神變玄象天有三萬六千宫殿地有三萬六千洞府人有三萬六千神識道為玄空之至精人是天地之靈精天地應玄空之大象道玄空而通變天稟淨性而得清地稟結氣而有形人稟精識而得生道無元氣而無變化天無元氣而不玄清地無元氣而不能生成萬物人無元氣命根則不存所以人能修道養生先須解存元氣而養神神氣若得住人命則得長生神者識也識者正也正者真也真者聖也聖者性也性者道也道者空也空者玄也玄者虛無也虛無者自然也自然者真常也真常者無名也無名者混沌也所以號之為混沌無形無影無極無窮也氣者虛也氣者無也氣者通也氣者風也氣者動也氣者象也氣者變也氣者呼吸也氣者輕舉也氣者飛揚也氣者散也氣者命也氣者開也氣者明也氣者光象也氣者能匿影藏形也氣者能運轉也歎其神氣變化功能不可尋測矣太上升玄三一融神變化妙經卷下
