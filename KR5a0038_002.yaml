front:
  text: 太上升玄三一融神變化妙經卷下道言萬物之中人為最貴萬法之中唯一是貴萬一之中唯真是貴萬真之中唯聖是貴萬聖之中唯道是貴所言玄一真一太一三一玄者是空空虛玄逺統上無極統下無基中觀無邊故名玄一玄者逺也體性無實含藏一切不礙萬物故名之為虛無虛者能通無者皆空性體無質故名之為空玄者是一一者是道性者是淨真一者是實理者是正故名正一太者是大能生萬物包統一切故名太一三一者是子上承玄父之靈氣下乘玄母之元精養育成形故上取玄父氣二下取玄母氣一合成和合中道共成一象故言兩半而成一一者子也故名嬰兒赤子子者狀若始生之狀稟氣第三故名三一赤子也第一是玄父稟玄空雄陽之氣所成故名玄一第二玄母稟雌隂之氣所成故名雌一能生萬物養育含情故名玄母號之為太一一者大也故名之為道毋是故稱玄一者天尊位稱玄毋雌一者天皇位稱真一帝一者道君位稱三一者赤子真人位稱正一者大法師位稱無名常存三一者是混空虛無道氣未分形相未立渾淪無有形影故名混沌無名常存三一道氣分形變化百億神通故稱空洞變化三一後分斷隂陽生成萬物布化十方故稱隂陽三一第一無名三一第二虛無自然三一第三空洞變化三一第四玄一第五真一第六元皇三一第七太一第八正一第九赤子隂陽故稱為九一之道空有九一常乘九氣道有九一位有九尊天有九一上有九清地有九一下有九泉人有九一頭上有九宫所言三一者稱之為三寶上虛無三寶玄元始三氣天中有三寶天有三界地有三寶嶽瀆水火人有三寶上中下丹田泥丸絳宫所稱為三五者三是玄元始三氣五是五行氣性在空為五氣在天為五星在位為五帝在地為五方在人為五藏是也道言三一行宫運化不停所居不同或以鎮在玄天七寶之宫或布化崑崙遊歷玄都或統御大羅觀望玄臺或治化天庭洞房明堂遍行六合匝至五皇幽房玄關華蓋之宫九一九子九女九皇出入崑崙治化九天明照九天日月出從天關入從幽門或處天廬日月之間或下治黃庭泥丸絳宫或隱在北極大泉之中呼吸精氣乘駕六龍遊往龜山或乘靈波以御九龍翔行九鳳策使太一始老帝公行至三月三一之間混合萬變冶錬百關開導津液神靜體安中央黃老治化玉皇戊巳洞神原一帝真治化幽谷補養華原乘氣納真出入生路或處命門關閉道户精不泄散邪惡不干太素流霞乘風散煙浮空駕虛上造雲庭開闔來去出入廬間千神百靈朝謁帝庭城闕交錯帷帳成雲天真總氣上通聖關玄一至道來去不難吞珠藏玉白石巖巒樓閣萬重黃帝之宅甘淵無窮玄芝化生金漿玉汋不死神丹還年保命骨化內騰遊歷八方上謁三清下治三界變化萬方都會玄臺朝謁聖皇旋行金闕下治帝鄉五嶽四瀆國土寧康一切萬姓永保吉良上一九帝天君諱凝天字玄先其二帝卿肇勤精從天仙兵馬一萬二千人中元三一帝皇諱神珠字子丹帝卿真人光堅從神仙兵馬一萬二千人下元真一諱神精字谷玄帝卿歸上明從地仙兵馬一萬二千人其上一長九寸九分著紫繡金帔戴玄天寶冠坐七寶之座或時乘九龍之車遊歷三界手執天寶之爐治化玉清其中一長三寸三分著丹錦之帔戴九鳳之冠坐七寶之座或時乘九麟之車遊歷十方手執金爐治化上清其下一長五寸五分著黃錦之帔戴九龍逺遊之冠坐七寶之座或時乘五色師子之車巡行五嶽手執寶香之爐治化太清其三一總會平旦朝上帝一君交度神氣補養骨髓納我華津神氣填滿體發華鮮日中總會中一絳宫教練赤子還魂復魄反老嬰童度命回年保命無窮日暮總會下元真一之宫清蕩穢濁除故納新生我五老帝真變易骨髓腸化為筋金骨玉髓契道契真自然變化無窮永與三寶同保命根夫三一者一一有變為三三一一變生成九
